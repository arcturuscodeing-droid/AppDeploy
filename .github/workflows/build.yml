name: Build AppDeploy Launcher

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Build Windows exe
        run: |
          cd AppDeploy/AppDeploy/launcher
          go mod init appdeploy
          go get github.com/webview/webview_go
          copy ..\..\..\main.go .
          go build -ldflags="-H windowsgui -s -w" -o ..\..\..\AppDeploy-Launcher.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: AppDeploy Launcher
          body: |
            ## AppDeploy Launcher v2
            Download AppDeploy-Launcher.exe and run it once, never touch it again.
            Supports single HTML files, ZIP apps, overlay mode, and live server.
          files: AppDeploy-Launcher.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
