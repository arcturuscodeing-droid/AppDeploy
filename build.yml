name: Build AppDeploy Launcher

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Windows exe
        run: |
          cd launcher
          go mod init appdeploy
          go get github.com/webview/webview_go
          go build -ldflags="-H windowsgui -s -w" -o ../AppDeploy-Launcher.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: AppDeploy Launcher
          body: |
            ## AppDeploy Launcher
            Download AppDeploy-Launcher.exe — run it once, never touch it again.
            Then open index.html in your browser to start dropping and running apps.
          files: AppDeploy-Launcher.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
